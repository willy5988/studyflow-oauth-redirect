
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重定向中...</title>
    <!-- 使用 meta 標籤進行自動重定向 -->
    <meta http-equiv="refresh" content="0; url=studyflow://oauth_callback" />
    <!-- 使用 JavaScript 確保重定向執行 -->
    <script>
        window.onload = function() {
            window.location.href = "studyflow://oauth_callback";
        };
    </script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 50px; 
            background-color: #f9f9f9;
            color: #333;
        }
        a {
            color: #0066cc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h2>正在將您重定向回應用程式...</h2>
    <p>如果畫面沒有自動跳轉，請 <a href="studyflow://oauth_callback">點擊這裡</a> 繼續。</p>
</body>
</html>
